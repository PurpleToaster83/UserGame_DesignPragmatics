<!Doctype html>
<html ng-app="experimentApp">

<head>
  <title>Player Pragmatic Design Inferance</title>
  <link rel="icon" type="image/x-icon" href="images/icon.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:100,100i,300,300i,400,400i,700,700i,900,900i">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="style.css">

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.0/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.0/angular-sanitize.js"></script>
  <!-- The core Firebase JS SDK is always required and must be listed first -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <!-- Initialize Firebase -->
  <script src="https://player-app-fbf4c.firebaseapp.com/__/firebase/init.js"></script>
  <!-- Experiment App -->
  <script src="lib/preloader.js"></script>
  <script src="app.js"></script>
</head>

<body ng-controller="ExperimentController">
    <div class="grid-container" id="grid" ng-init="initGridContainer()"></div>
    <br>
    <br>
    <div class="inventory">
        <span>Inventory: </span>
        <img ng-repeat="item in inventory" 
            ng-src="{{getInventoryImg(item)}}" 
            class="inventory-item">
    </div>
</body>

</html>
